name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Unit + property + golden all live in the Vitest suite; coverage gives the
      # engine a floor to defend as ops land. Goldens are compared here (not
      # written) because they are committed, so a real diff fails the build.
      - name: Test (unit + property + golden) with coverage
        run: npm run test:coverage

      - name: Build (static export, 0 functions)
        run: npm run build
